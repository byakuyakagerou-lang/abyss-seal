<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深淵の封印 - Abyss Seal v1.5.1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- ログイン画面 -->
        <div id="login-screen" class="screen active">
            <div class="login-box glass-panel">
                <h1 class="title">深淵の封印<br><span class="subtitle">Abyss Seal v1.5.1</span></h1>
                <p class="description">探索者か、狂信者か。<br>5つの祭壇を巡る正体隠匿の儀式が始まる。</p>
                <div class="input-group">
                    <input type="text" id="player-name-input" placeholder="探索者の名を入力" maxlength="10">
                    <button id="create-room-btn" class="btn primary-btn">部屋を作成する</button>
                    <button id="show-rooms-btn" class="btn">部屋を探す</button>
                </div>
                <div id="login-error" class="error-msg"></div>
            </div>
            <!-- 背景エフェクト用 -->
            <div class="particles"></div>
        </div>

        <!-- 部屋一覧画面 -->
        <div id="room-list-screen" class="screen">
            <div class="login-box glass-panel" style="max-width: 600px; width: 90%;">
                <h2 class="title" style="font-size: 2rem;">オンラインルーム一覧</h2>
                <button id="refresh-rooms-btn" class="btn" style="margin-bottom: 1rem;">更新</button>
                <div id="active-rooms-container" style="display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto;">
                    <!-- Rooms will be populated here -->
                </div>
                <button id="back-to-login-btn" class="btn" style="margin-top: 2rem;">戻る</button>
            </div>
            <!-- 背景エフェクト用 -->
            <div class="particles"></div>
        </div>

        <!-- ルーム画面 -->
        <div id="room-screen" class="screen">
            <div class="login-box glass-panel" style="max-width: 600px;">
                <h2 class="title" style="font-size: 2rem;">オンラインルーム <span style="font-size: 1rem; color: var(--text-muted);">v1.5.1</span></h2>
                <p class="description">5人集まり、全員が「準備完了」になると儀式が開始されます。</p>
                
                <div id="room-players-list" style="display: flex; flex-direction: column; gap: 10px; margin: 20px 0; text-align: left;">
                    <!-- 動的に追加 -->
                </div>

                <div class="input-group" style="margin-top: 2rem;">
                    <button id="toggle-ready-btn" class="btn primary-btn">準備完了にする</button>
                    <button id="room-add-bot-btn" class="btn">CPUを追加</button>
                </div>
            </div>
            <!-- 背景エフェクト用 -->
            <div class="particles"></div>
        </div>

        <!-- ゲーム画面 -->
        <div id="game-screen" class="screen">
            <header class="game-header glass-panel">
                <div class="round-info">
                    <h2>第 <span id="round-number">1</span> の祭壇</h2>
                    <p id="phase-name" class="phase-name">待機中</p>
                </div>
                <div class="ritual-status">
                    <div class="status-item success">成功: <span id="success-count">0</span>/3</div>
                    <div class="status-item fail">失敗: <span id="fail-count">0</span>/3</div>
                    <div class="status-item deck">山札: <span id="deck-count">30</span>枚</div>
                </div>
            </header>

            <main class="game-layout">
                <!-- 左側：他プレイヤー情報＆メインボード -->
                <section class="left-panel">
                    <div class="other-players glass-panel" id="other-players-container">
                        <!-- 他プレイヤーがここに動的に生成される -->
                    </div>
                    
                    <div class="main-action-area glass-panel">
                        <div id="action-prompt" class="action-prompt">他のプレイヤーの参加を待っています...</div>
                        
                        <div id="action-controls" class="action-controls">
                            <!-- 状況に応じてボタンが切り替わる -->
                            <button id="select-participants-btn" class="btn primary-btn hidden">儀式参加者を決定</button>
                            <button id="submit-card-btn" class="btn primary-btn hidden">選択したカードを提出</button>
                            <button id="reroll-san-btn" class="btn danger-btn hidden">選択したカードを引直す(SAN-1)</button>
                            <button id="event-action-btn" class="btn danger-btn hidden">対象を決定</button>
                        </div>
                    </div>
                </section>

                <!-- 右側：チャット＆ログ -->
                <section class="right-panel">
                    <div class="chat-container glass-panel">
                        <div class="chat-log" id="chat-log"></div>
                        <div class="chat-input-area">
                            <input type="text" id="chat-input" placeholder="メッセージを入力...">
                            <button id="send-chat-btn" class="btn">送信</button>
                        </div>
                    </div>
                </section>
            </main>

            <!-- 下部：自分のステータス＆手札 -->
            <footer class="player-dashboard glass-panel">
                <div class="my-status">
                    <h3 id="my-name">Player Name</h3>
                    <div class="role-box" id="my-role">Role: ???</div>
                    <div class="san-box">SAN: <span id="my-san" class="san-value">3</span>/3</div>
                </div>
                <div class="my-hand" id="my-hand-container">
                    <!-- 手札がここに生成される -->
                </div>
            </footer>
            
            <!-- 儀式結果アニメーション用 -->
            <div id="ritual-animation-container" class="ritual-animation hidden">
                <div class="ritual-animation-title">儀式結果</div>
                <div class="ritual-animation-cards" id="ritual-animation-cards"></div>
            </div>

            <!-- 神話イベントアニメーション用 -->
            <div id="event-animation-container" class="event-animation-container hidden"></div>
        </div>

        <!-- オーバーレイ (ゲーム終了等) -->
        <div id="overlay" class="overlay hidden">
            <div class="overlay-content glass-panel" style="max-width: 800px; padding: 2rem;">
                <h2 id="overlay-title">Game Over</h2>
                <p id="overlay-desc"></p>
                <div id="result-players-list" style="display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap;">
                    <!-- リザルト画面での役職公開用 -->
                </div>
                <button id="return-to-room-btn" class="btn primary-btn" style="margin-top: 2rem;">ルームに戻る</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="main.js"></script>
</body>
</html>
